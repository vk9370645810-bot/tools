<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VicaMobi Professional QR Code Generator</title>
<meta name="description" content="Professional free QR Code Generator by VicaMobi">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--p:#2563eb;--bg:#eef4ff}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Arial;background:linear-gradient(135deg,#0f172a,#2563eb);padding:24px}
.wrap{max-width:920px;margin:auto;background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.25)}
header{padding:28px;background:var(--p);color:#fff;text-align:center}
main{display:grid;grid-template-columns:1.2fr .8fr;gap:24px;padding:24px}
@media(max-width:800px){main{grid-template-columns:1fr}}
.card{background:#f8fafc;border:1px solid #e5e7eb;border-radius:16px;padding:18px}
label{display:block;margin:12px 0 6px;font-weight:700}
input,select{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:10px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{padding:12px;border:0;border-radius:10px;background:var(--p);color:#fff;font-weight:700;cursor:pointer}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
#qrcode{display:flex;justify-content:center;align-items:center;min-height:290px;background:#fff;border:2px dashed #dbeafe;border-radius:12px}
small{color:#555}
footer{text-align:center;padding:16px;background:#f1f5f9}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>VicaMobi Professional QR Code Generator</h1>
<p>Create beautiful QR codes for Website, Text, Email, Phone & WhatsApp</p>
</header>
<main>
<div class="card">
<label>QR Type</label>
<select id="type">
<option value="url">Website URL</option>
<option value="text">Text</option>
<option value="email">Email</option>
<option value="phone">Phone</option>
<option value="whatsapp">WhatsApp</option>
</select>

<label>Content</label>
<input id="content" placeholder="https://example.com">

<div class="row">
<div>
<label>QR Size</label>
<select id="size">
<option>180</option><option selected>240</option><option>300</option><option>360</option>
</select>
</div>
<div>
<label>QR Color</label>
<input id="color" type="color" value="#000000">
</div>
</div>

<div class="actions">
<button onclick="makeQR()">Generate</button>
<button onclick="downloadQR()">Download</button>
<button onclick="resetQR()">Reset</button>
</div>
<p><small>Tip: Enter a complete URL beginning with https://</small></p>
</div>

<div class="card">
<div id="qrcode"></div>
</div>
</main>
<footer>
<strong>Features:</strong> Responsive • PNG Download • Color Picker • Mobile Friendly • Blogger Ready
</footer>
</div>

<script>
let node=null;
function val(){
 let t=type.value,v=content.value.trim();
 if(t==="email") return "mailto:"+v;
 if(t==="phone") return "tel:"+v;
 if(t==="whatsapp") return "https://wa.me/"+v.replace(/\D/g,"");
 return v;
}
function makeQR(){
 let box=document.getElementById("qrcode");
 box.innerHTML="";
 if(!content.value.trim()){alert("Please enter content.");return;}
 new QRCode(box,{
   text:val(),
   width:+size.value,
   height:+size.value,
   colorDark:color.value,
   colorLight:"#ffffff",
   correctLevel:QRCode.CorrectLevel.H
 });
 setTimeout(()=>node=box.querySelector("img")||box.querySelector("canvas"),150);
}
function downloadQR(){
 if(!node){alert("Generate a QR code first.");return;}
 let url=node.tagName==="IMG"?node.src:node.toDataURL("image/png");
 let a=document.createElement("a");
 a.href=url;
 a.download="vicamobi-professional-qr.png";
 a.click();
}
function resetQR(){
 content.value="";
 qrcode.innerHTML="";
 node=null;
}
</script>
</body>
</html>
